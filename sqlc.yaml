version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/feature/organization/repository/queries.sql"
    schema: "internal/infrastructure/storage/postgres/migrations/*.sql"
    gen:
      go:
        package: "postgres"
        out: "internal/feature/organization/repository/postgres"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
  - engine: "postgresql"
    queries: "internal/feature/consent/repository/queries.sql"
    schema: "internal/infrastructure/storage/postgres/migrations/*.sql"
    gen:
      go:
        package: "postgres"
        out: "internal/feature/consent/repository/postgres"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true